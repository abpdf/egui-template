name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build (${{ matrix.os }})
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # 同时构建 x64 和 ARM64 架构
        os:
          - ubuntu-latest        # x64
          - windows-latest       # x64
          - macos-13             # x64 (Intel)
          - ubuntu-24.04-arm     # ARM64
          - windows-11-arm       # ARM64
          - macos-14             # ARM64 (Apple Silicon)
        include:
          # x64 架构配置
          - os: ubuntu-latest
            artifact_name: egui-template
            asset_name: egui-template-linux-amd64
            rust_version: stable
          - os: windows-latest
            artifact_name: egui-template.exe
            asset_name: egui-template-windows-amd64.exe
            rust_version: 1.77.2
          - os: macos-13
            artifact_name: egui-template
            asset_name: egui-template-macos-amd64
            rust_version: stable
          # ARM64 架构配置
          - os: ubuntu-24.04-arm
            artifact_name: egui-template
            asset_name: egui-template-linux-arm64
            rust_version: stable
          - os: windows-11-arm
            artifact_name: egui-template.exe
            asset_name: egui-template-windows-arm64.exe
            rust_version: 1.77.2   # 可根据需要改为 stable
          - os: macos-14
            artifact_name: egui-template
            asset_name: egui-template-macos-arm64
            rust_version: stable
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust_version }}

      - name: Build release
        run: cargo build --release --verbose

      # 重命名构建产物（Windows 用 copy，其他用 cp）
      - name: Rename asset (Windows)
        if: matrix.os == 'windows-latest' || matrix.os == 'windows-11-arm'
        run: copy target\release\${{ matrix.artifact_name }} target\release\${{ matrix.asset_name }}
        shell: cmd

      - name: Rename asset (Linux/macOS)
        if: matrix.os != 'windows-latest' && matrix.os != 'windows-11-arm'
        run: cp target/release/${{ matrix.artifact_name }} target/release/${{ matrix.asset_name }}

      # 上传附件
      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          files: target/release/${{ matrix.asset_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}