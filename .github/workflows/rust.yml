name: Release

on:
  push:
    tags:
      - 'v*'   # 当推送以 'v' 开头的标签时触发，例如 v1.0.0

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true   # 自动生成 release notes（基于合并的 PR）
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build (${{ matrix.os }})
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]   # 需要构建的平台
        include:
          - os: ubuntu-latest
            artifact_name: egui-template
            asset_name: egui-template-linux-amd64
          - os: windows-latest
            artifact_name: egui-template.exe
            asset_name: egui-template-windows-amd64.exe
          - os: macos-latest
            artifact_name: egui-template
            asset_name: egui-template-macos-amd64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build release
        run: cargo build --release --verbose

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          files: target/release/${{ matrix.artifact_name }}
          name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
