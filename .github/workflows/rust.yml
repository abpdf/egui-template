name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build (${{ matrix.target }})
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # Linux x86_64 (AMD64)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: egui-template
            asset_name: egui-template-linux-amd64
            rust_version: stable
            needs_compiler: false
          
          # Linux ARM64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact_name: egui-template
            asset_name: egui-template-linux-arm64
            rust_version: stable
            needs_compiler: false
          
          # Linux x86 32-bit
          - os: ubuntu-latest
            target: i686-unknown-linux-gnu
            artifact_name: egui-template
            asset_name: egui-template-linux-x86
            rust_version: stable
            needs_compiler: true
            compiler_packages: gcc-multilib
            linker: ""
          
          # Linux ARM 32-bit (ARMv7)
          - os: ubuntu-latest
            target: armv7-unknown-linux-gnueabihf
            artifact_name: egui-template
            asset_name: egui-template-linux-armv7
            rust_version: stable
            needs_compiler: true
            compiler_packages: gcc-arm-linux-gnueabihf
            linker: arm-linux-gnueabihf-gcc
          
          # Windows x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: egui-template.exe
            asset_name: egui-template-windows-amd64.exe
            rust_version: 1.77.2
            needs_compiler: false
          
          # Windows ARM64
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
            artifact_name: egui-template.exe
            asset_name: egui-template-windows-arm64.exe
            rust_version: 1.77.2
            needs_compiler: false
          
          # Windows x86 32-bit
          - os: windows-latest
            target: i686-pc-windows-msvc
            artifact_name: egui-template.exe
            asset_name: egui-template-windows-x86.exe
            rust_version: 1.77.2
            needs_compiler: false
          
          # macOS Intel (AMD64) - 修正 runner 标签
          - os: macos-13
            target: x86_64-apple-darwin
            artifact_name: egui-template
            asset_name: egui-template-macos-amd64
            rust_version: stable
            needs_compiler: false
          
          # macOS ARM64 (Apple Silicon)
          - os: macos-14
            target: aarch64-apple-darwin
            artifact_name: egui-template
            asset_name: egui-template-macos-arm64
            rust_version: stable
            needs_compiler: false
          
          # macOS Intel (AMD64) - 备用 runner (如果 macos-13 不可用)
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: egui-template
            asset_name: egui-template-macos-amd64-latest
            rust_version: stable
            needs_compiler: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust_version }}
          
      # 安装目标平台
      - name: Add target
        run: rustup target add ${{ matrix.target }}

      # 显示 Rust 版本和目标
      - name: Show Rust info
        run: |
          rustc --version
          rustup target list --installed

      # 安装交叉编译依赖 (Linux)
      - name: Install cross-compilation dependencies
        if: matrix.needs_compiler == true && runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.compiler_packages }}
          if [ -n "${{ matrix.linker }}" ]; then
            echo "CARGO_TARGET_$(echo ${{ matrix.target }} | tr '[:lower:]' '[:upper:]' | tr '-' '_')_LINKER=${{ matrix.linker }}" >> $GITHUB_ENV
          fi

      # 对于 Linux ARM 32-bit，设置环境变量
      - name: Set linker for ARMv7
        if: matrix.target == 'armv7-unknown-linux-gnueabihf'
        run: |
          echo "CARGO_TARGET_ARMV7_UNKNOWN_LINUX_GNUEABIHF_LINKER=arm-linux-gnueabihf-gcc" >> $GITHUB_ENV
          echo "CC_armv7_unknown_linux_gnueabihf=arm-linux-gnueabihf-gcc" >> $GITHUB_ENV
          echo "CXX_armv7_unknown_linux_gnueabihf=arm-linux-gnueabihf-g++" >> $GITHUB_ENV

      # 对于 Linux x86 32-bit，设置环境变量
      - name: Set linker for i686
        if: matrix.target == 'i686-unknown-linux-gnu'
        run: |
          echo "CARGO_TARGET_I686_UNKNOWN_LINUX_GNU_LINKER=gcc" >> $GITHUB_ENV
          echo "CC_i686_unknown_linux_gnu=gcc" >> $GITHUB_ENV
          echo "CXX_i686_unknown_linux_gnu=g++" >> $GITHUB_ENV

      # 对于 macOS 构建，可能需要设置 SDKROOT
      - name: Setup macOS environment
        if: runner.os == 'macOS'
        run: |
          # 显示 macOS 版本信息
          sw_vers
          # 设置 SDKROOT（如果需要）
          echo "SDKROOT=$(xcrun --sdk macosx --show-sdk-path)" >> $GITHUB_ENV
          echo "MACOSX_DEPLOYMENT_TARGET=10.13" >> $GITHUB_ENV

      - name: Build release
        run: cargo build --release --verbose --target ${{ matrix.target }}
        
      # 处理构建产物位置 (Linux/macOS)
      - name: Locate and rename binary (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          # 检查交叉编译的输出目录
          if [ -f "target/${{ matrix.target }}/release/${{ matrix.artifact_name }}" ]; then
            cp "target/${{ matrix.target }}/release/${{ matrix.artifact_name }}" "target/${{ matrix.asset_name }}"
            echo "Binary copied from target/${{ matrix.target }}/release/"
          elif [ -f "target/release/${{ matrix.artifact_name }}" ]; then
            cp "target/release/${{ matrix.artifact_name }}" "target/${{ matrix.asset_name }}"
            echo "Binary copied from target/release/"
          else
            echo "Binary not found!"
            echo "Searching in target directory:"
            find target -name "${{ matrix.artifact_name }}" -type f 2>/dev/null || true
            echo "Contents of target/:"
            ls -la target/ || true
            if [ -d "target/${{ matrix.target }}" ]; then
              echo "Contents of target/${{ matrix.target }}/release/:"
              ls -la "target/${{ matrix.target }}/release/" || true
            fi
            exit 1
          fi
          
      # 处理构建产物位置 (Windows)
      - name: Locate and rename binary (Windows)
        if: runner.os == 'Windows'
        run: |
          if (Test-Path "target\${{ matrix.target }}\release\${{ matrix.artifact_name }}") {
            Copy-Item "target\${{ matrix.target }}\release\${{ matrix.artifact_name }}" "target\${{ matrix.asset_name }}"
            Write-Host "Binary copied from target\${{ matrix.target }}\release\"
          } elseif (Test-Path "target\release\${{ matrix.artifact_name }}") {
            Copy-Item "target\release\${{ matrix.artifact_name }}" "target\${{ matrix.asset_name }}"
            Write-Host "Binary copied from target\release\"
          } else {
            Write-Error "Binary not found!"
            Get-ChildItem target\ -Recurse -Filter "${{ matrix.artifact_name }}"
            exit 1
          }
        shell: pwsh

      # 验证文件是否存在
      - name: List files (debug)
        run: |
          echo "=== Files in target directory ==="
          ls -la target/ || dir target\
          echo "=== End of file list ==="
        shell: bash

      # 计算 SHA256 校验和
      - name: Calculate SHA256
        run: |
          if [ -f "target/${{ matrix.asset_name }}" ]; then
            echo "SHA256 for ${{ matrix.asset_name }}:"
            shasum -a 256 "target/${{ matrix.asset_name }}" | tee "target/${{ matrix.asset_name }}.sha256"
          else
            echo "File not found: target/${{ matrix.asset_name }}"
            exit 1
          fi
        shell: bash

      # 上传附件
      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            target/${{ matrix.asset_name }}
            target/${{ matrix.asset_name }}.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}